<ion-content [fullscreen]="true" class="ion-padding bg-slate-50">
  <div class="min-h-full flex flex-col items-center justify-center p-6">
    
    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden animate-in fade-in zoom-in-95 duration-700">
      
      <div class="bg-purple-600 p-10 text-center">
        <div class="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4 backdrop-blur-md">
          <ion-icon name="lock-open-outline" class="text-white text-4xl"></ion-icon>
        </div>
        <h2 class="text-2xl font-black text-white tracking-tight">Set Your Password</h2>
        <p class="text-purple-100 text-sm mt-2 opacity-90">Secure your account to start your journey</p>
      </div>

      <div class="p-10 space-y-6">
        
        <div class="space-y-4">
          <div class="space-y-2">
            <label class="text-xs font-black uppercase tracking-widest text-slate-400 ml-1">New Password</label>
            <div class="relative flex items-center">
              <input 
                type="password" 
                [(ngModel)]="password"
                placeholder="••••••••"
                class="w-full py-4 px-6 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-purple-400 transition-all outline-none text-slate-700 placeholder:text-slate-400/50">
            </div>
          </div>

          <div class="space-y-2">
            <label class="text-xs font-black uppercase tracking-widest text-slate-400 ml-1">Confirm Password</label>
            <div class="relative flex items-center">
              <input 
                type="password" 
                [(ngModel)]="confirmPassword"
                placeholder="••••••••"
                class="w-full py-4 px-6 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-purple-400 transition-all outline-none text-slate-700 placeholder:text-slate-400/50">
            </div>
          </div>
        </div>

        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
          <ul class="text-[11px] space-y-1 text-slate-500 font-medium">
            <li class="flex items-center gap-2">
              <ion-icon [name]="password.length >= 8 ? 'checkmark-circle' : 'ellipse-outline'" 
                        [class.text-green-500]="password.length >= 8"></ion-icon>
              At least 8 characters
            </li>
            <li class="flex items-center gap-2">
              <ion-icon [name]="(password === confirmPassword && password !== '') ? 'checkmark-circle' : 'ellipse-outline'"
                        [class.text-green-500]="(password === confirmPassword && password !== '')"></ion-icon>
              Passwords match
            </li>
          </ul>
        </div>

        <ion-button 
          (click)="handleFinish()" 
          [disabled]="isLoading || password.length < 8 || password !== confirmPassword"
          expand="block" 
          shape="round" 
          color="primary" 
          class="h-16 font-bold text-lg mt-8 shadow-lg shadow-purple-200">
          
          @if (isLoading) {
            <ion-spinner name="crescent"></ion-spinner>
          } @else {
            Activate Account
          }
        </ion-button>

      </div>
    </div>

  </div>
</ion-content>
