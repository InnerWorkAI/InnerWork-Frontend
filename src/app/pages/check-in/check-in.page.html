<ion-content [fullscreen]="true" class="bg-[#0f0f12]">
  
  <div class="max-w-[1600px] mx-auto p-6 lg:p-12 w-full min-h-full flex flex-col justify-center">

    @if (isLoading) {
      <div class="flex flex-col items-center justify-center animate-in fade-in duration-500">
        <div class="w-16 h-16 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-purple-400 mt-6 font-bold tracking-widest uppercase animate-pulse">Checking status...</p>
      </div>
    } 
    @else if (hasPendingSurvey) {
      <div class="flex flex-col lg:flex-row gap-8 items-stretch w-full animate-in slide-in-from-bottom-8 duration-700">
        
        <div class="flex-1">
          <app-webcam-person-detector class="block h-full"></app-webcam-person-detector>
        </div>

        <div class="flex-1">
          <app-employee-survey class="block h-full" (onSurveyFinished)="hasPendingSurvey = false"></app-employee-survey>
        </div>

      </div>
    } 
    @else {
      <div class="max-w-2xl mx-auto w-full animate-in zoom-in-95 duration-500">
        <div class="bg-white rounded-[3rem] p-16 shadow-2xl text-center border border-gray-100">
          <div class="w-24 h-24 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-8">
            <ion-icon name="checkmark-circle" class="text-6xl"></ion-icon>
          </div>
          <h2 class="text-4xl font-black text-gray-900 mb-4 tracking-tight">All caught up!</h2>
          <p class="text-gray-500 text-xl leading-relaxed">
            You have already completed your daily check-in. <br>
            Come back tomorrow to reflect on your day.
          </p>
          <div class="mt-10">
            <ion-button routerLink="/home" expand="block" shape="round" class="h-16 font-bold text-lg">
              Go to Dashboard
            </ion-button>
          </div>
        </div>
      </div>
    }

  </div>

</ion-content>
