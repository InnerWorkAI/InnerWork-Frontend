<ion-content [fullscreen]="true" class="bg-[#0f0f12]">
  <div class="max-w-[1600px] mx-auto p-6 lg:p-12 w-full min-h-full flex flex-col justify-center">

    @if (isLoading() || isSaving) {
      <div class="flex flex-col items-center justify-center animate-in fade-in duration-500">
        <div class="relative w-20 h-20">
            <div class="absolute inset-0 border-4 border-purple-500/20 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
        
        <p class="text-purple-400 mt-8 font-black tracking-[0.2em] uppercase text-sm animate-pulse text-center">
          {{ isSaving ? 'Analyzing Data... Almost there!' : 'Verifying Status...' }}
        </p>
      </div>
    } 
    
    @else if (!hasDoneCheckin()) {
      <div class="flex flex-col lg:flex-row gap-8 items-stretch w-full animate-in slide-in-from-bottom-8 duration-700">
        <div class="flex-1">
          <app-webcam-person-detector class="block h-full" (onJournalFinished)="handleJournalFinished($event)"></app-webcam-person-detector>
        </div>
        <div class="flex-1">
          <app-employee-survey class="block h-full" (onSurveyFinished)="handleSurveyFinished($event)"></app-employee-survey>
        </div>
      </div>
    } 
    
    @else {
      <div class="max-w-2xl mx-auto w-full animate-in zoom-in-95 duration-500">
        <div class="bg-white rounded-[3rem] p-12 lg:p-16 shadow-2xl text-center border border-gray-100 relative overflow-hidden">
          <div class="absolute top-0 left-0 w-full h-2 bg-green-400"></div>
          
          <div class="w-24 h-24 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner">
            <ion-icon name="checkmark-circle" class="text-6xl"></ion-icon>
          </div>
          
          <h2 class="text-4xl font-black text-gray-900 mb-4 tracking-tight">All caught up!</h2>
          <p class="text-gray-500 text-xl leading-relaxed px-4">
            You have already completed your check-in this week.
          </p>
          
          <div class="mt-12">
            <ion-button routerLink="/home" expand="block" mode="ios" class="h-16 font-bold text-lg purple-gradient-button">
              Return to Dashboard
            </ion-button>
          </div>
        </div>
      </div>
    }

  </div>
</ion-content>
