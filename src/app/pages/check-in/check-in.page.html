<ion-content [fullscreen]="true" class="bg-[#0f0f12]"> 
  <div class="flex flex-col lg:flex-row gap-8 items-stretch max-w-[1600px] mx-auto p-6 lg:p-12 w-full">
    
    <div class="flex-1">
      <div class="bg-white rounded-[2.5rem] p-10 shadow-sm border border-gray-100 h-full flex flex-col">
        <h2 class="text-3xl font-bold text-gray-900 mb-8">Video Journaling</h2>
        
        <div class="flex-grow flex flex-col justify-center">
          <div class="w-full aspect-video bg-[#1a1c26] rounded-3xl mb-6 flex items-center justify-center">
              <app-webcam-person-detector></app-webcam-person-detector>
          </div>
          <p class="text-gray-400 text-center text-sm leading-relaxed px-6">
            Use the webcam to record a short video journal entry. Reflect on your day...
          </p>
        </div>
      </div>
    </div>

    <div class="flex-1">
      <app-employee-survey class="block h-full"></app-employee-survey>
    </div>

  </div>
</ion-content>
