<ion-header class="ion-no-border shadow-md">
  <ion-toolbar class="nav-toolbar px-4">
    <div class="flex items-center justify-between w-full max-w-7xl mx-auto h-16">
      
      <div class="flex items-center cursor-pointer group">
        <div class="p-2 bg-white rounded-lg shadow-sm group-hover:shadow-md transition-all">
          <img src="assets/images/innerwork-logo.png" class="h-7 w-7 object-contain" alt="Logo">
        </div>
        <span class="ml-3 text-xl font-bold tracking-tight text-white uppercase">InnerWork</span>
      </div>

      <nav class="hidden md:flex items-center ml-10 space-x-2 flex-1">
        @if (authService.userRole() === 'admin') {
          <ion-button fill="clear" routerLink="/admin/dashboard" class="nav-link">Dashboard</ion-button>
          <ion-button fill="clear" routerLink="/admin/employees" class="nav-link">Employees</ion-button>
        } @else {
          <ion-button fill="clear" routerLink="/my-dashboard" class="nav-link">My Dashboard</ion-button>
          <ion-button fill="clear" routerLink="/check-in" class="nav-link">Check-In</ion-button>
        }
      </nav>

      <div class="flex items-center">
        <ion-button (click)="authService.logout()" fill="outline" class="logout-pill font-bold text-xs">
          Logout
        </ion-button>
      </div>

    </div>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-router-outlet></ion-router-outlet> 
</ion-content>
