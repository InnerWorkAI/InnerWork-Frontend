<form (ngSubmit)="onSubmit()" class="space-y-5">

  <div class="flex flex-col">
    <label class="text-sm font-bold text-gray-700 mb-1 ml-1">
      Company name
    </label>
    <div class="flex items-center w-full h-12 px-4 bg-white border border-gray-300 rounded-2xl shadow-sm focus-within:ring-2 focus-within:ring-purple-200 focus-within:border-purple-500 transition-all">
      <ion-input 
        type="text"
        placeholder="Enter company name"
        class="text-gray-900 w-full"
        [value]="name()"
        (ionInput)="name.set($any($event).target.value)">
      </ion-input>
    </div>
  </div>

  <div class="flex flex-col">
    <label class="text-sm font-bold text-gray-700 mb-1 ml-1">
      Email address
    </label>
    <div class="flex items-center w-full h-12 px-4 bg-white border border-gray-300 rounded-2xl shadow-sm focus-within:ring-2 focus-within:ring-purple-200 focus-within:border-purple-500 transition-all">
      <ion-input 
        type="email"
        placeholder="john.doe@example.com"
        class="text-gray-900 w-full"
        [value]="email()"
        (ionInput)="email.set($any($event).target.value)">
      </ion-input>
    </div>
  </div>

  <div class="flex flex-col">
    <label class="text-sm font-bold text-gray-700 mb-1 ml-1">
      Password
    </label>
    <div class="flex items-center w-full h-12 px-4 bg-white border border-gray-300 rounded-2xl shadow-sm focus-within:ring-2 focus-within:ring-purple-200 focus-within:border-purple-500 transition-all">
      <ion-input 
        type="password"
        placeholder="**********"
        class="text-gray-900 w-full"
        [value]="password()"
        (ionInput)="password.set($any($event).target.value)">
      </ion-input>
    </div>
  </div>

  <ion-button 
    type="submit"
    expand="block"
    class="h-14 font-black mt-8"
    style="--border-radius: 1rem; --background: #9333ea;"
    [disabled]="isFormInvalid()">
    Log In
  </ion-button>

</form>
