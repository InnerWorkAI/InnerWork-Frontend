<div class="bg-white p-6 rounded-2xl">
  @if (title() || subtitle()) {
    <div class="mb-8">
      @if (title()) { <h3 class="text-xl font-bold text-gray-800">{{ title() }}</h3> }
      @if (subtitle()) { <p class="text-sm text-gray-500">{{ subtitle() }}</p> }
    </div>
  }
  
  <div class="w-full">
    <apx-chart
      [series]="series()"
      [chart]="chart"
      [xaxis]="xaxis()"
      [yaxis]="yaxis"
      [stroke]="stroke"
      [fill]="fill"
      [tooltip]="tooltip"
      [colors]="colors()"> 
    </apx-chart>
  </div>
</div>

<div class="bg-white p-6 rounded-2xl">
  @if (legend().length > 0) {
    <div class="flex justify-center items-center gap-4 mb-6 text-xs font-medium text-gray-600">
      @for (item of legend(); track item.label) {
        <div class="flex items-center gap-2">
          <span [class]="item.isLine ? 'w-4 h-1' : 'w-3 h-3 rounded-full'" 
                [style.background-color]="item.color">
          </span>
          <span>{{ item.label }}</span>
        </div>
      }
    </div>
  }
