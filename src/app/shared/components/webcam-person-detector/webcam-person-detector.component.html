<div class="flex flex-col items-center justify-center p-4">
  
  <div class="relative w-[640px] h-[480px] bg-slate-900 rounded-2xl shadow-2xl overflow-hidden flex items-center justify-center">
    
    <div *ngIf="isLoading" class="flex flex-col items-center">
      <div class="w-12 h-12 border-4 border-blue-400 border-t-transparent rounded-full animate-spin"></div>
      <p class="text-blue-400 mt-4 font-medium animate-pulse">Cargando Inteligencia Artificial...</p>
    </div>

    <video #videoElement 
           [class.hidden]="isLoading"
           autoplay playsinline muted 
           class="absolute inset-0 w-full h-full object-cover -scale-x-100">
    </video>

    <div *ngIf="!isLoading && faceDetected" 
         class="absolute top-4 right-4 bg-green-500 text-white px-3 py-1 rounded-full text-xs font-bold z-20 shadow-lg">
      ROSTRO DETECTADO
    </div>
  </div>

  <button 
    [disabled]="isLoading"
    (click)="startWebcam()" 
    class="mt-6 px-8 py-3 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-bold rounded-xl transition-all shadow-lg active:scale-95">
    {{ isLoading ? 'Cargando...' : 'Iniciar Cámara' }}
  </button>
</div>
