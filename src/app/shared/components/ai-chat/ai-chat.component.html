<div class="flex flex-col h-[600px] bg-slate-50 rounded-[2rem] overflow-hidden border border-slate-200 shadow-xl">
  <div class="bg-white p-6 border-b border-slate-100 flex items-center gap-4">
    <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center text-purple-600">
      <ion-icon name="sparkles" class="text-2xl"></ion-icon>
    </div>
    <div>
      <h3 class="font-bold text-slate-800">Mindful Assistant</h3>
      <p class="text-xs text-green-500 font-medium tracking-wide uppercase">Especialista en Bienestar</p>
    </div>
  </div>

  <div class="flex-grow overflow-y-auto p-6 space-y-6" #scrollContainer>
    @for (msg of messages; track msg.timestamp) {
      <div class="flex" [ngClass]="msg.role === 'user' ? 'justify-end' : 'justify-start'">
        <div [ngClass]="msg.role === 'user' 
          ? 'bg-purple-600 text-white rounded-2xl rounded-tr-none shadow-md' 
          : 'bg-white text-slate-700 rounded-2xl rounded-tl-none shadow-sm border border-slate-100'"
          class="max-w-[80%] p-4 leading-relaxed">
          {{ msg.content }}
          <span class="block text-[10px] mt-2 opacity-50" [ngClass]="msg.role === 'user' ? 'text-right' : 'text-left'">
            {{ msg.timestamp | date:'shortTime' }}
          </span>
        </div>
      </div>
    }

    @if (isTyping) {
      <div class="flex justify-start animate-pulse">
        <div class="bg-white p-4 rounded-2xl rounded-tl-none border border-slate-100 shadow-sm">
          <ion-spinner name="dots" color="primary"></ion-spinner>
        </div>
      </div>
    }
  </div>

  <div class="p-6 bg-white border-t border-slate-100">
    <div class="relative flex items-center">
      <input type="text" 
             [(ngModel)]="userInput"
             (keyup.enter)="sendMessage()"
             placeholder="Escribe cómo te sientes..."
             class="w-full py-4 pl-6 pr-16 bg-slate-100 border-none rounded-full focus:ring-2 focus:ring-purple-400 transition-all outline-none text-slate-700">
      
      <button (click)="sendMessage()" 
              [disabled]="!userInput.trim()"
              class="absolute right-2 w-12 h-12 bg-purple-600 text-white rounded-full flex items-center justify-center hover:bg-purple-700 disabled:bg-slate-300 transition-colors shadow-lg">
        <ion-icon name="send"></ion-icon>
      </button>
    </div>
  </div>
</div>
