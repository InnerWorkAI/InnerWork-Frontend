<ion-header class="ion-no-border">
  <div class="flex justify-between items-center p-4 bg-white border-b border-slate-100">
    <h2 class="text-2xl font-bold text-purple-600 tracking-tight">
      {{ employee.first_name }} {{ employee.last_name }}
    </h2>
    <button (click)="close()" class="text-slate-400 hover:text-slate-600 transition-all focus:outline-none">
      <ion-icon name="close" class="text-3xl"></ion-icon>
    </button>
  </div>
</ion-header>

<ion-content class="bg-white" [scrollY]="false" style="--background: white;">
  <div class="pl-4 pr-4">

    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
      <div>
        <h3 class="text-lg font-bold text-slate-800">Well-being Evolution</h3>
        <p class="text-xs text-slate-500">AI-Detected Stress patterns</p>
      </div>

      <div class="flex bg-slate-100 p-1 rounded-2xl w-full sm:w-auto">
        <ion-button (click)="setRange(28)" fill="none"
          [style.--background]="daysRange() === 28 ? '#a855f7' : 'transparent'"
          [style.--color]="daysRange() === 28 ? 'white' : '#64748b'"
          class="!min-h-0 h-9 !m-0 !p-0 rounded-xl text-xs font-bold transition-all duration-200 overflow-hidden --padding-start-0 --padding-end-0 shadow-none"
          style="--padding-start: 12px; --padding-end: 12px; --border-radius: 12px;">
          1 Month
        </ion-button>

        <ion-button (click)="setRange(84)" fill="none"
          [style.--background]="daysRange() === 84 ? '#a855f7' : 'transparent'"
          [style.--color]="daysRange() === 84 ? 'white' : '#64748b'"
          class="!min-h-0 h-9 !m-0 !p-0 rounded-xl text-xs font-bold transition-all duration-200 overflow-hidden shadow-none"
          style="--padding-start: 12px; --padding-end: 12px; --border-radius: 12px;">
          3 Months
        </ion-button>
      </div>
    </div>

    <div class="w-full h-[320px]">
      @if (chartSeries() && chartSeries().length > 0 && chartSeries()[0]?.data?.length) {
      <app-employee-chart [series]="chartSeries()" [categories]="chartCategories()"
        [chartColors]="['#a855f7', '#111827']">
      </app-employee-chart>
      } @else {
      <div
        class="h-full flex flex-col items-center justify-center text-slate-400 border-2 border-dashed border-slate-50 rounded-3xl">
        <ion-icon name="stats-chart-outline" class="text-4xl mb-2 opacity-20"></ion-icon>
        <p class="text-xs font-medium">No data found</p>
      </div>
      }
    </div>

  </div>
</ion-content>
