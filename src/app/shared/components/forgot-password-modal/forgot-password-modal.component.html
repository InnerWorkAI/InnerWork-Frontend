<ion-header class="ion-no-border">
  <ion-toolbar class="px-2 pt-2">
    <ion-title class="font-bold text-gray-800">Reset Password</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()" color="medium">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="flex flex-col h-full">
    <div class="text-center mb-8">
      <div class="bg-purple-50 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <ion-icon name="key-outline" class="text-3xl text-[#B794F4]"></ion-icon>
      </div>
      <p class="text-gray-500 text-sm px-4">
        Enter the email associated with your account and we'll send you a link to reset your password.
      </p>
    </div>

    <div class="space-y-4 flex-1">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2 ml-1">
          Email Address
        </label>
        <ion-input 
          type="email" 
          placeholder="your@email.com" 
          class="custom-input"
          [value]="email()"
          (ionInput)="email.set($any($event).target.value)">
        </ion-input>
      </div>

      <ion-button 
        expand="block" 
        mode="ios" 
        class="login-button h-12 font-bold normal-case mt-6"
        [disabled]="!isValidEmail() || isLoading()"
        (click)="sendResetLink()">
        <ion-spinner *ngIf="isLoading()" name="crescent" class="mr-2"></ion-spinner>
        Send Reset Link
      </ion-button>
    </div>
  </div>
</ion-content>
